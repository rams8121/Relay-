<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Relay — Receiver</title>
<style>
:root{--bg:#07070e;--surface:#10101a;--border:#1a1a28;--accent:#00ff88;--accent2:#00aaff;--danger:#ff4055;--text:#dde0f0;--muted:#4a4a65}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.hlogo{font-weight:800;font-size:16px}.hlogo span{color:var(--accent)}
.conn-badge{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted);font-family:monospace}
.conn-badge.live{border-color:var(--accent);color:var(--accent);background:rgba(0,255,136,.08)}
.conn-badge.err{border-color:var(--danger);color:var(--danger)}
.session-form{padding:20px;border-bottom:1px solid var(--border)}
.session-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.session-row{display:flex;gap:8px}
.session-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:monospace;font-size:16px;outline:none;text-transform:uppercase;letter-spacing:.1em}
.connect-btn{background:var(--accent);color:#050508;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer}
.connect-btn.connected{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.connect-btn:disabled{opacity:.5;cursor:not-allowed}
.err-box{margin-top:10px;padding:10px 14px;background:rgba(255,64,85,.12);border:1px solid #ff4055;border-radius:8px;color:#ff6070;font-size:12px;line-height:1.5;word-break:break-all}
.audio-status{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.audio-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0}
.audio-dot.playing{background:var(--accent);box-shadow:0 0 10px var(--accent)}
.audio-dot.buffering{background:var(--accent2)}
.audio-info{flex:1}
.audio-main{font-size:13px;font-weight:600}
.audio-sub{font-size:11px;color:var(--muted);margin-top:2px}
.stats-row{display:flex;padding:10px 20px;gap:8px;border-bottom:1px solid var(--border)}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.stat-num{font-size:18px;font-weight:700;color:var(--accent);font-family:monospace}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:1px}
.latency-row{padding:8px 20px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}
.history-section{padding:12px 20px}
.history-title{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;letter-spacing:.08em;margin-bottom:8px}
.clear-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--muted);cursor:pointer}
.history-list{display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto}
.history-item{display:flex;gap:8px;align-items:center;font-size:12px;padding:6px 8px;background:var(--surface);border-radius:6px}
.hi-time{color:var(--muted);font-family:monospace;font-size:10px}
.hi-size{color:var(--accent2);font-family:monospace}
.hi-status{margin-left:auto;font-size:11px}
.hi-status.buffered{color:var(--muted)}
.hi-status.played{color:var(--accent)}
.hi-status.skipped{color:#666}
.hi-status.error{color:var(--danger)}
.empty-msg{color:var(--muted);font-size:13px;text-align:center;padding:20px}
.vol-row{display:flex;align-items:center;gap:10px;padding:12px 20px;border-top:1px solid var(--border);margin-top:12px}
.vol-row input{flex:1}
.vol-row div{font-size:12px;color:var(--muted)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:9999}
.toast.show{opacity:1}
#dbg{padding:6px 20px;font-size:10px;color:#aaa;font-family:monospace;border-bottom:1px solid var(--border);word-break:break-all;min-height:20px}
</style>
</head>
<body>

<div class="header">
  <div class="hlogo">RELAY<span>.IO</span></div>
  <div class="conn-badge" id="connBadge">DISCONNECTED</div>
</div>

<div class="session-form">
  <div class="session-label">Session ID (from laptop)</div>
  <div class="session-row">
    <input class="session-input" id="sessionInput" placeholder="e.g. AB3K9X"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" maxlength="10"/>
    <button class="connect-btn" id="connectBtn">CONNECT</button>
  </div>
  <div id="errBox" class="err-box" style="display:none"></div>
</div>

<div class="audio-status">
  <div class="audio-dot" id="audioDot"></div>
  <div class="audio-info">
    <div class="audio-main" id="audioMain">Waiting for audio...</div>
    <div class="audio-sub" id="audioSub">Connect to a session to begin</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="stat-num" id="statChunks">0</div><div class="stat-lbl">PLAYED</div></div>
  <div class="stat-box"><div class="stat-num" id="statKb">0</div><div class="stat-lbl">KB HEARD</div></div>
  <div class="stat-box"><div class="stat-num" id="statQueue">0</div><div class="stat-lbl">QUEUED</div></div>
</div>

<div class="latency-row">⏱ Latency: <span id="latencyVal">—</span></div>
<div id="dbg">—</div>

<div class="history-section">
  <div class="history-title">
    <span>📻 RECEIVED CHUNKS</span>
    <button class="clear-btn" id="clearBtn">CLEAR</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="empty-msg">No audio received yet</div>
  </div>
</div>

<div class="vol-row">
  <div>🔊</div>
  <input type="range" id="volSlider" min="0" max="100" value="100"/>
  <div id="volVal">100%</div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB = "https://rama-20456-default-rtdb.firebaseio.com";
const POLL_MS = 400;

let isConnected = false, sessionId = null, pollInterval = null;
let lastChunkKey = null;
let audioQueue = [], isPlaying = false;
let volume = 1.0, totalChunks = 0, totalKb = 0;

// WebM header state
// headerBytes  = the raw bytes of chunk index=0 (EBML+Tracks)
// headerLocked = true once we have a good header that played successfully
// We NEVER overwrite a locked header — errors on later chunks don't reset it
let headerBytes  = null;
let headerLocked = false;
let chunksSinceHeader = 0; // how many chunks we've seen since header was set

function dbg(msg) {
  document.getElementById('dbg').textContent = msg;
  console.log('[R]', msg);
}

// ── Firebase ──────────────────────────────────────────────────
async function fbGet(path, params = {}) {
  const url = new URL(`${DB}/${path}.json`);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url.toString());
  if (!r.ok) throw new Error('FB ' + r.status);
  return r.json();
}

// ── Connect ───────────────────────────────────────────────────
document.getElementById('connectBtn').addEventListener('click', async () => {
  if (isConnected) { disconnect(); return; }
  const sid = document.getElementById('sessionInput').value.trim().toUpperCase();
  if (!sid) { showError('Enter session ID'); return; }
  sessionId = sid;
  const btn = document.getElementById('connectBtn');
  btn.disabled = true; btn.textContent = 'CONNECTING...';
  clearError();

  try {
    const r = await Promise.race([
      fetch(`${DB}/.json?shallow=true`),
      new Promise((_,rej) => setTimeout(() => rej(new Error('Timeout')), 8000))
    ]);
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch(e) { showError('Cannot reach Firebase: ' + e.message); btn.disabled=false; btn.textContent='CONNECT'; return; }

  try {
    const meta = await fbGet(`sessions/${sessionId}/meta`);
    if (!meta) { showError('Session not found.'); btn.disabled=false; btn.textContent='CONNECT'; return; }
  } catch(e) { showError('Lookup failed: ' + e.message); btn.disabled=false; btn.textContent='CONNECT'; return; }

  startPolling();
});

function disconnect() {
  isConnected = false;
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  audioQueue = []; isPlaying = false;
  headerBytes = null; headerLocked = false; chunksSinceHeader = 0;
  document.getElementById('connBadge').textContent = 'DISCONNECTED';
  document.getElementById('connBadge').className = 'conn-badge';
  document.getElementById('connectBtn').className = 'connect-btn';
  document.getElementById('connectBtn').textContent = 'CONNECT';
  document.getElementById('connectBtn').disabled = false;
  document.getElementById('audioDot').className = 'audio-dot';
  document.getElementById('audioMain').textContent = 'Disconnected';
}

// ── Start polling — jump to live position ────────────────────
function startPolling() {
  isConnected = true;
  audioQueue = []; isPlaying = false;
  headerBytes = null; headerLocked = false; chunksSinceHeader = 0;

  (async () => {
    // Find the current live chunk so we don't replay old audio
    // We also need chunk index=0 for the WebM header.
    // Strategy: fetch last 2 chunks. If one has index=0, that's our header source.
    // Otherwise anchor to latest and wait for new chunks.
    try {
      const snap = await fbGet(`sessions/${sessionId}/chunks`, { orderBy:'"$key"', limitToLast:'2' });
      if (snap && typeof snap === 'object') {
        const keys = Object.keys(snap).sort();

        // Check if any of these is the header chunk (index 0)
        for (const k of keys) {
          if (snap[k].index === 0) {
            const bin = atob(snap[k].audio);
            headerBytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) headerBytes[i] = bin.charCodeAt(i);
            dbg('Header pre-loaded from chunk index=0 (' + headerBytes.length + 'B)');
            break;
          }
        }

        // Anchor to latest key — only receive NEW chunks from here
        if (keys.length) lastChunkKey = keys[keys.length - 1];
      }
    } catch(e) { dbg('Anchor err: ' + e.message); }

    document.getElementById('connBadge').textContent = '● LIVE';
    document.getElementById('connBadge').className = 'conn-badge live';
    document.getElementById('connectBtn').className = 'connect-btn connected';
    document.getElementById('connectBtn').textContent = 'DISCONNECT';
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('audioMain').textContent = 'Listening...';
    document.getElementById('audioSub').textContent = `Session: ${sessionId}`;
    document.getElementById('audioDot').className = 'audio-dot buffering';
    showToast('Connected! 🎧');

    pollInterval = setInterval(pollChunks, POLL_MS);
    pollChunks();
  })();
}

async function pollChunks() {
  if (!isConnected) return;
  try {
    let chunks = null;
    try {
      const params = lastChunkKey
        ? { orderBy:'"$key"', startAfter:`"${lastChunkKey}"`, limitToLast:'10' }
        : { orderBy:'"$key"', limitToLast:'1' };
      chunks = await fbGet(`sessions/${sessionId}/chunks`, params);
    } catch {
      const all = await fbGet(`sessions/${sessionId}/chunks`);
      if (all && typeof all === 'object') {
        const allKeys = Object.keys(all).sort();
        const nk = lastChunkKey ? allKeys.filter(k => k > lastChunkKey) : allKeys.slice(-1);
        chunks = {}; nk.forEach(k => { chunks[k] = all[k]; });
      }
    }

    if (chunks && typeof chunks === 'object') {
      const keys = Object.keys(chunks).sort();
      const now = Date.now();
      for (const k of keys) {
        const chunk = chunks[k];
        if (chunk.ts) document.getElementById('latencyVal').textContent = (now - chunk.ts) + 'ms';
        enqueueChunk(chunk, k);
        lastChunkKey = k;
      }
    }

    try {
      const hb = await fbGet(`sessions/${sessionId}/heartbeat`);
      if (hb && typeof hb === 'number') {
        const stale = Date.now() - hb > 15000;
        document.getElementById('connBadge').textContent = stale ? '⚠ STALE' : '● LIVE';
        document.getElementById('connBadge').className = 'conn-badge ' + (stale ? 'err' : 'live');
      }
    } catch(e) {}
  } catch(e) { console.error('Poll:', e); }
}

function enqueueChunk(chunk, key) {
  audioQueue.push({ chunk, key });
  totalKb += (chunk.size || 0) / 1024;
  addHistoryItem(chunk, key, 'buffered');
  updateStats();
  if (!isPlaying) playNext();
}

// ── b64 → Uint8Array ──────────────────────────────────────────
function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

// ── Playback ──────────────────────────────────────────────────
async function playNext() {
  if (audioQueue.length === 0) {
    isPlaying = false;
    document.getElementById('audioDot').className = 'audio-dot buffering';
    document.getElementById('audioMain').textContent = 'Waiting for audio...';
    updateStats();
    return;
  }

  isPlaying = true;
  const { chunk, key } = audioQueue.shift();
  updateStats();

  document.getElementById('audioDot').className = 'audio-dot playing';
  document.getElementById('audioMain').textContent = '▶ Live';
  document.getElementById('audioSub').textContent =
    `Chunk #${chunk.index ?? '?'} · ${((chunk.size||0)/1024).toFixed(1)}KB`;

  const mimeType = chunk.mimeType || 'audio/webm;codecs=opus';

  try {
    const bytes = b64ToBytes(chunk.audio);
    chunksSinceHeader++;

    let playBytes;

    if (chunk.index === 0) {
      // This IS the header chunk — save it (only if not already locked)
      if (!headerLocked) {
        headerBytes = bytes;
        dbg('Header saved: ' + bytes.length + 'B (idx=0)');
      }
      playBytes = bytes;
    } else if (!headerBytes) {
      // Don't have header yet — skip this chunk, can't decode without it
      dbg('No header yet, skipping chunk #' + chunk.index);
      markHistoryError(key);
      playNext();
      return;
    } else {
      // Normal chunk: prepend header so Android can decode it
      playBytes = new Uint8Array(headerBytes.length + bytes.length);
      playBytes.set(headerBytes, 0);
      playBytes.set(bytes, headerBytes.length);
    }

    const blob = new Blob([playBytes], { type: mimeType });
    const url = URL.createObjectURL(blob);

    await new Promise((resolve, reject) => {
      const audio = new Audio();
      audio.volume = volume;
      audio.preload = 'auto';
      audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      audio.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('code=' + (audio.error?.code) + ' ' + (audio.error?.message || '')));
      };
      audio.src = url;
      audio.play().catch(e => { URL.revokeObjectURL(url); reject(e); });
    });

    // Only lock the header AFTER first successful play
    if (chunk.index === 0 && !headerLocked) {
      headerLocked = true;
      dbg('Header locked ✅');
    }

    totalChunks++;
    updateStats();
    markHistoryPlayed(key);
    dbg('✅ #' + chunk.index + ' played');

  } catch(e) {
    dbg('❌ #' + (chunk.index ?? '?') + ': ' + e.message);
    markHistoryError(key);

    // If the header chunk itself failed, clear it so next chunk#0 can replace it
    if (chunk.index === 0 && !headerLocked) {
      headerBytes = null;
      dbg('Header chunk failed, will retry on next chunk#0');
    }
    // For non-header chunks: keep the locked header, it's still good
    // The error was in the data chunk, not the header
  }

  playNext();
}

// ── Stats / History ───────────────────────────────────────────
function updateStats() {
  document.getElementById('statChunks').textContent = totalChunks;
  document.getElementById('statKb').textContent = totalKb.toFixed(0);
  document.getElementById('statQueue').textContent = audioQueue.length;
}
function addHistoryItem(chunk, key, status) {
  const list = document.getElementById('historyList');
  const empty = list.querySelector('.empty-msg');
  if (empty) empty.remove();
  const now = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'history-item';
  div.id = 'hi_' + key;
  const label = status === 'skipped' ? '⏩ SKIPPED' : '● BUFFERED';
  const cls   = status === 'skipped' ? 'skipped' : 'buffered';
  div.innerHTML = `<span class="hi-time">${now}</span><span class="hi-size">${((chunk.size||0)/1024).toFixed(1)}KB</span><span class="hi-status ${cls}" id="hs_${key}">${label}</span>`;
  list.insertBefore(div, list.firstChild);
  if (list.children.length > 50) list.removeChild(list.lastChild);
}
function markHistoryPlayed(key) {
  const s = document.getElementById('hs_' + key);
  if (s) { s.textContent = '✓ PLAYED'; s.className = 'hi-status played'; }
}
function markHistoryError(key) {
  const s = document.getElementById('hs_' + key);
  if (s) { s.textContent = '✗ ERROR'; s.className = 'hi-status error'; }
}

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('historyList').innerHTML = '<div class="empty-msg">No audio received yet</div>';
  // Reset header so it re-syncs from next chunk#0
  if (!headerLocked) { headerBytes = null; chunksSinceHeader = 0; }
});
document.getElementById('volSlider').addEventListener('input', function() {
  volume = this.value / 100;
  document.getElementById('volVal').textContent = this.value + '%';
});
function showError(msg) { const b=document.getElementById('errBox'); b.textContent='⚠ '+msg; b.style.display='block'; }
function clearError()   { const b=document.getElementById('errBox'); b.style.display='none'; b.textContent=''; }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
window.addEventListener('load', () => {
  const s = new URLSearchParams(window.location.search).get('session');
  if (s) {
    document.getElementById('sessionInput').value = s.toUpperCase();
    setTimeout(() => document.getElementById('connectBtn').click(), 400);
  }
});
</script>
</body>
</html>
